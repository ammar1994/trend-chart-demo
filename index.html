<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استلام الحسابات التلقائي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #38bdf8;
        }

        p.subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #fff;
            font-size: 16px;
            outline: none;
            text-align: center;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #38bdf8;
        }

        button.btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: #0f172a;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button.btn-primary:hover {
            background: #0ea5e9;
        }

        .result-box {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.5s ease;
        }

        /* تعديل جوهري لتوزيع محتويات الخانة بالتساوي */
        .data-row {
            background: #0f172a;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
            text-align: right;
        }

        .data-content {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
        }

        .data-label {
            font-size: 14px;
            color: #94a3b8;
            white-space: nowrap;
        }

        .data-value {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            user-select: all;
        }

        .btn-copy {
            background: #22d3ee;
            color: #0f172a;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s;
            margin-left: 10px;
        }

        .btn-copy:hover {
            background: #06b6d4;
        }

        .btn-otp {
            width: 100%;
            background: #38bdf8;
            color: #0f172a;
            margin-top: 10px;
        }

        .btn-otp:hover {
            background: #0ea5e9;
        }

        .error-msg {
            color: #f43f5e;
            font-size: 14px;
            margin-top: 12px;
            display: none;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>بوابة استلام الحسابات الآلية</h2>
    <p class="subtitle">أدخل رقم الطلب الخاص بك لاستلام بيانات الحساب فوراً</p>

    <div class="form-group">
        <label for="orderNumber">رقم الطلب:</label>
        <input type="number" id="orderNumber" placeholder="أدخل رقم الطلب هنا">
    </div>

    <button class="btn-primary" onclick="verifyOrder()">التحقق من الطلب</button>
    <div id="errorMsg" class="error-msg">رقم الطلب غير صحيح أو انتهت صلاحيته!</div>

    <div id="resultBox" class="result-box">
        <div class="data-row">
            <button class="btn-copy" onclick="copyText('usernameVal', this)">نسخ</button>
            <div class="data-content">
                <span class="data-label">اسم المستخدم:</span>
                <span id="usernameVal" class="data-value">Ammar_Gamer</span>
            </div>
        </div>

        <div class="data-row">
            <button class="btn-copy" onclick="copyText('passwordVal', this)">نسخ</button>
            <div class="data-content">
                <span class="data-label">كلمة المرور:</span>
                <span id="passwordVal" class="data-value">Pass@2026</span>
            </div>
        </div>

        <button class="btn-primary btn-otp" onclick="getOTP()">سحب كود التحقق OTP</button>
        
        <div id="otpRow" class="data-row" style="margin-top: 14px; display: none;">
            <button class="btn-copy" onclick="copyText('otpVal', this)">نسخ</button>
            <div class="data-content">
                <span class="data-label">كود الـ OTP الحالي:</span>
                <span id="otpVal" class="data-value" style="color: #38bdf8;">617312</span>
            </div>
        </div>
    </div>
</div>

<script>
    let attemptCount = 0;
    const MAX_ATTEMPTS = 5;

    function verifyOrder() {
        const orderInput = document.getElementById('orderNumber').value;
        const resultBox = document.getElementById('resultBox');
        const errorMsg = document.getElementById('errorMsg');

        if (attemptCount >= MAX_ATTEMPTS) {
            errorMsg.innerText = "لقد تجاوزت الحد الأقصى من المحاولات المسموحة لهذا اليوم لحماية الحساب!";
            errorMsg.style.display = "block";
            resultBox.style.display = "none";
            return;
        }

        if (orderInput === "12345") {
            errorMsg.style.display = "none";
            resultBox.style.display = "block";
            document.getElementById('otpRow').style.display = "none"; 
            attemptCount = 0; // تصفير العداد عند النجاح
        } else {
            attemptCount++;
            resultBox.style.display = "none";
            errorMsg.innerText = `رقم الطلب غير صحيح! (المحاولات المتبقية: ${MAX_ATTEMPTS - attemptCount})`;
            errorMsg.style.display = "block";
        }
    }

    function copyText(elementId, btn) {
        const textToCopy = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "تم!";
            btn.style.background = "#10b981";
            btn.style.color = "#fff";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#22d3ee";
                btn.style.color = "#0f172a";
            }, 1500);
        });
    }

    function getOTP() {
        const otpRow = document.getElementById('otpRow');
        otpRow.style.display = "flex";
        otpRow.style.animation = "fadeIn 0.4s ease";
    }
</script>

</body>
</html>
