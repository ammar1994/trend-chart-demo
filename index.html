<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحليل البيانات</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; padding: 10px; color: white; }
        .dashboard { background: #1e293b; padding: 15px; border-radius: 10px; }
        .chart-wrapper { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <h6>لوحة تحكم Django</h6>
        <select id="windowSize" class="form-select bg-dark text-white mb-3" onchange="processData()">
            <option value="3">متوسط 3 أيام</option>
            <option value="5">متوسط 5 أيام</option>
        </select>
        <div class="chart-wrapper">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('mainChart').getContext('2d');
    const rawData = [15, 25, 20, 45, 40, 60, 55, 80, 75, 95];
    let chart;

    function processData() {
        renderChart(parseInt(document.getElementById('windowSize').value));
    }

    function renderChart(win) {
        if (chart) chart.destroy();
        const ma = rawData.map((_, i, arr) => {
            if (i < win - 1) return null;
            let sum = arr.slice(i - win + 1, i + 1).reduce((a, b) => a + b, 0);
            return (sum / win).toFixed(1);
        });

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: rawData.map((_, i) => i+1),
                datasets: [
                    { label: 'البيانات', data: rawData, borderColor: '#38bdf8', tension: 0.3 },
                    { label: 'الترند', data: ma, borderColor: '#f43f5e', borderDash: [5, 5] }
                ]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true } }
            }
        });
    }
    processData();
</script>
</body>
</html>
