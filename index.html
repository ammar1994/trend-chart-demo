<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - ترند المتوسطات</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 20px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .chart-container { height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4">
        <h4 class="mb-4">تحليل ترند البيانات (مُحاكي)</h4>
        <div class="btn-group mb-3">
            <button class="btn btn-outline-primary" onclick="updateChart(3)">متوسط 3 أيام</button>
            <button class="btn btn-outline-primary" onclick="updateChart(5)">متوسط 5 أيام</button>
        </div>
        <div class="chart-container">
            <canvas id="trendChart"></canvas>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('trendChart').getContext('2d');
    const rawData = [15, 25, 20, 45, 40, 60, 55, 80, 75, 95];
    let trendChart;

    function calculateMA(data, windowSize) {
        return data.map((_, i) => {
            if (i < windowSize - 1) return null;
            let sum = 0;
            for (let j = 0; j < windowSize; j++) sum += data[i - j];
            return (sum / windowSize).toFixed(1);
        });
    }

    function createChart(windowSize) {
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 10}, (_, i) => `اليوم ${i+1}`),
                datasets: [
                    { label: 'البيانات الخام', data: rawData, borderColor: '#0d6efd', tension: 0.3 },
                    { label: `متوسط ${windowSize} أيام`, data: calculateMA(rawData, windowSize), borderColor: '#dc3545', borderDash: [5, 5] }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function updateChart(size) { createChart(size); }
    createChart(3); // التشغيل الافتراضي
</script>

</body>
</html>
